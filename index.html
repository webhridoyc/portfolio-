<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Space Animation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="space-container">
        <!-- Starfield layers for parallax effect -->
        <div class="starfield starfield-1"></div>
        <div class="starfield starfield-2"></div>
        <div class="starfield starfield-3"></div>
        
        <!-- Animated cosmic objects -->
        <div class="cosmic-objects">
            <div class="planet planet-1"></div>
            <div class="planet planet-2"></div>
            <div class="planet planet-3"></div>
            <div class="asteroid asteroid-1"></div>
            <div class="asteroid asteroid-2"></div>
            <div class="asteroid asteroid-3"></div>
        </div>
        
        <!-- Shooting stars and comets -->
        <div class="shooting-stars">
            <div class="shooting-star"></div>
            <div class="shooting-star"></div>
            <div class="shooting-star"></div>
            <div class="shooting-star"></div>
        </div>
        
        <!-- Nebula particle effects -->
        <div class="nebula">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
        
        <!-- Sample content overlay -->
        <div class="content-overlay">
            <h1 class="space-title">INFINITE SPACE</h1>
            <p class="space-subtitle">Journey through the cosmos</p>
            <button class="space-button">Explore Universe</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
